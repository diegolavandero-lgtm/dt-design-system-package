  if (!isOpen) {
    wrap.classList.add('dt-open');
    menu.style.display = 'block';
    const t = wrap.querySelector('.dt-dtrigger');
    t.style.border = '2px solid var(--b6)';
    t.style.background = 'var(--b1)';
    setTimeout(function() {
      function h(e) { if (!wrap.contains(e.target)) { dtDropClose(wrap); document.removeEventListener('click', h); } }
      document.addEventListener('click', h);
    }, 0);
  }
}
function dtDropClose(wrap) {
  wrap.classList.remove('dt-open');
  const menu = wrap.querySelector('.dt-dmenu');
  if (menu) menu.style.display = 'none';
  const t = wrap.querySelector('.dt-dtrigger');
  if (!t) return;
  const label = wrap.querySelector('.dt-dlabel');
  const hasFill = label && label.dataset.filled === '1';
  const isBorderless = t.dataset.theme === 'borderless';
  t.style.border = isBorderless ? '1px solid transparent' : (hasFill ? '1px solid var(--n5)' : '1px solid var(--n3)');
  t.style.background = hasFill ? '#fff' : (isBorderless ? 'transparent' : '#fff');
}
function dtPickOpt(optEl) {
  const wrap  = optEl.closest('.dt-drop-wrap');
  const label = wrap.querySelector('.dt-dlabel');
  label.textContent    = optEl.dataset.val || optEl.textContent.trim();
  label.style.color    = 'var(--n7)';
  label.dataset.filled = '1';
  dtDropClose(wrap);
}

/* ── Multiselect ── */
function dtMultiDrop(wrap) {
  const menu = wrap.querySelector('.dt-mmenu');
  const isOpen = wrap.classList.contains('dt-mopen');
  if (isOpen) { dtMultiClose(wrap); return; }
  document.querySelectorAll('.dt-drop-wrap.dt-open').forEach(w => dtDropClose(w));
  wrap.classList.add('dt-mopen');
  menu.style.display = 'block';
  const t = wrap.querySelector('.dt-mtrigger');
  t.style.border = '2px solid var(--b6)';
  t.style.background = 'var(--b1)';
  setTimeout(function() {
    function h(e) { if (!wrap.contains(e.target)) { dtMultiClose(wrap); document.removeEventListener('click', h); } }
    document.addEventListener('click', h);
  }, 0);
}
function dtMultiClose(wrap) {
  wrap.classList.remove('dt-mopen');
  const menu = wrap.querySelector('.dt-mmenu');
  if (menu) menu.style.display = 'none';
  const t = wrap.querySelector('.dt-mtrigger');
  if (!t) return;
  const chips = wrap.querySelector('.dt-mchips');
  const hasChips = chips && chips.querySelector('span.dt-chip');
  t.style.border = hasChips ? '1px solid var(--n5)' : '1px solid var(--n3)';
  t.style.background = '#fff';
}
function dtRenderChips(wrap) {
  const chips  = wrap.querySelector('.dt-mchips');
  const allCbs = [...wrap.querySelectorAll('.dt-mopt input[type=checkbox]')];
  const checked = allCbs.filter(c => c.checked);
  const xSvg = '<svg viewBox="0 0 32 32" width="9" height="9" fill="currentColor"><path d="M24 9.4L22.6 8 16 14.6 9.4 8 8 9.4l6.6 6.6L8 22.6 9.4 24l6.6-6.6 6.6 6.6 1.4-1.4-6.6-6.6z"/></svg>';
  if (checked.length === 0) {
    chips.innerHTML = '<span style="font:400 14px/20px var(--font-sans);color:var(--n6)">Select options...</span>';
  } else {
    chips.innerHTML = checked.map(c => {
      const lbl = c.dataset.label;
      const safe = lbl.replace(/"/g, '&quot;');
      return `<span class="dt-chip" style="display:inline-flex;align-items:center;gap:3px;height:20px;padding:0 6px;background:var(--b1);border:1px solid var(--b3);border-radius:999px;font:400 12px/1 var(--font-sans);color:var(--b6);flex-shrink:0"><span onclick='event.stopPropagation();dtChipRemove(this,"${safe}")' style='cursor:pointer;display:flex;align-items:center;opacity:.7'>${xSvg}</span>&nbsp;${lbl}</span>`;
    }).join('');
  }
  const t = wrap.querySelector('.dt-mtrigger');
  t.style.border = checked.length ? '1px solid var(--n5)' : '1px solid var(--n3)';
}
function dtMultiCheck(cb) {
  dtRenderChips(cb.closest('.dt-drop-wrap'));
}
function dtChipRemove(btn, label) {
  const wrap = btn.closest('.dt-drop-wrap');
  wrap.querySelectorAll('.dt-mopt input[type=checkbox]').forEach(function(cb) {
    if (cb.dataset.label === label) { cb.checked = false; }
  });
  dtRenderChips(wrap);
}
</script>

<!-- ── Auth guard + Realtime presence ── -->
<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.replace('login.html'); return; }

  // Show user email in topbar and wire logout
  const emailEl = document.getElementById('topbar-user-email');
  if (emailEl) emailEl.textContent = session.user.email;

  document.getElementById('topbar-logout')?.addEventListener('click', async () => {
    await sb.auth.signOut();
    location.replace('login.html');
  });

  // ── Realtime presence: count who's currently on the DS ──
  function updateUsersStat(count) {
    const val   = document.getElementById('stat-users-val');
    const trend = document.getElementById('stat-users-val-trend');
    if (val)   val.textContent   = count;
    if (trend) trend.textContent = count === 1 ? 'currently online' : 'currently online';
  }

  const presenceChannel = sb.channel('ds-online', {
    config: { presence: { key: session.user.id } },
  });

  presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const count = Object.keys(presenceChannel.presenceState()).length;
      updateUsersStat(count);
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await presenceChannel.track({
          user_id: session.user.id,
          name: session.user.email.split('@')[0],
          at: new Date().toISOString(),
        });
      }
    });

  // Re-run whenever the overview section is navigated to
  const origNavigate = window.navigate;
  if (typeof origNavigate === 'function') {
    window.navigate = async function(id, ...args) {
      await origNavigate.call(this, id, ...args);
      if (id === 'overview') {
        const count = Object.keys(presenceChannel.presenceState()).length;
        updateUsersStat(count);
      }
    };
  }
})();
</script>
</body>
</html>
