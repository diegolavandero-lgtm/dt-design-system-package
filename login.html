<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in — DispatchTrack Design System</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --indigo:#132045;
  --b5:#4B82FA;--b6:#1F60ED;--b7:#0052CC;
  --n1:#F5F6FA;--n2:#F0F2F5;--n3:#E1E6ED;--n5:#67768D;--n7:#39414D;
  --r6:#DE350B;
  --font:'DM Sans',system-ui,sans-serif;
}
html,body{height:100%;background:var(--n2);font-family:var(--font);color:var(--n7)}

/* ── layout ── */
.page{min-height:100vh;display:flex;flex-direction:column}
.top{height:52px;background:var(--indigo);display:flex;align-items:center;padding:0 24px;flex-shrink:0}
.center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px}

/* ── card ── */
.card{background:#fff;border:1px solid var(--n3);border-radius:12px;width:100%;max-width:400px;padding:40px 36px;box-shadow:0 4px 24px rgba(19,32,69,.07)}

.card-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:32px}
.card-brand .ds-label{font:700 11px/1 var(--font);letter-spacing:.08em;text-transform:uppercase;color:var(--n5)}

.card h1{font:700 22px/1.2 var(--font);color:var(--n7);text-align:center;margin-bottom:6px}
.card .sub{font:400 13px/1.5 var(--font);color:var(--n5);text-align:center;margin-bottom:28px}

/* ── form ── */
.field{margin-bottom:16px}
.field label{display:block;font:500 12px/1 var(--font);color:var(--n7);margin-bottom:6px}
.field input{
  width:100%;height:40px;padding:0 12px;
  border:1.5px solid var(--n3);border-radius:6px;
  font:400 14px var(--font);color:var(--n7);
  background:#fff;outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--b5);box-shadow:0 0 0 3px rgba(75,130,250,.15)}
.field input::placeholder{color:#A0ABBB}

.btn{
  width:100%;height:40px;
  background:var(--b6);color:#fff;
  border:none;border-radius:6px;
  font:600 14px var(--font);cursor:pointer;
  transition:background .15s;
  margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:hover{background:var(--b7)}
.btn:disabled{opacity:.55;cursor:default}

/* ── error / status ── */
.msg{
  font:400 13px/1.4 var(--font);
  border-radius:6px;padding:10px 14px;
  margin-bottom:16px;display:none;
}
.msg.error{background:#FFEBE6;color:var(--r6);display:block}
.msg.info {background:#EDF5FF;color:var(--b7);display:block}

/* ── spinner ── */
.spin{
  width:16px;height:16px;border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  animation:spin .6s linear infinite;
  display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}
.btn.loading .spin{display:block}
.btn.loading .btn-txt{display:none}
</style>
</head>
<body>
<div class="page">

  <!-- topbar -->
  <div class="top">
    <img src="sections/assets/logos/dt-wordmark-white.svg" height="18" alt="DispatchTrack" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span style="display:none;font:700 15px/1 'DM Sans',sans-serif;color:#fff;letter-spacing:-.01em">DispatchTrack</span>
  </div>

  <!-- centered card -->
  <div class="center">
    <div class="card">

      <div class="card-brand">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="8" fill="#132045"/>
          <path d="M10 12h10a6 6 0 0 1 0 12H10V12z" fill="#4B82FA"/>
          <path d="M16 18h4a2 2 0 0 1 0 4h-4v-4z" fill="#fff"/>
        </svg>
        <span class="ds-label">Design System</span>
      </div>

      <h1>Sign in</h1>
      <p class="sub">Internal access only — DispatchTrack team</p>

      <div id="msg" class="msg"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@dispatchtrack.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="submit-btn">
          <span class="btn-txt">Sign in</span>
          <span class="spin"></span>
        </button>
      </form>

    </div>
  </div>

</div>

<script src="supabase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Already logged in → go straight to the app
  const { data: { session } } = await supabase.auth.getSession();
  if (session) { location.replace('index.html'); return; }

  const form   = document.getElementById('login-form');
  const btn    = document.getElementById('submit-btn');
  const msgEl  = document.getElementById('msg');

  function showMsg(text, type) {
    msgEl.textContent = text;
    msgEl.className   = 'msg ' + type;
  }
  function clearMsg() {
    msgEl.className = 'msg';
    msgEl.textContent = '';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearMsg();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showMsg('Please enter your email and password.', 'error');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      showMsg(error.message, 'error');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    showMsg('Signing you in…', 'info');
    location.replace('index.html');
  });
})();
</script>
</body>
</html>
